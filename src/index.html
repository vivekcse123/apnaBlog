<!doctype html>
<html lang="en-IN" data-theme="light">
<head>
  <script>
    // Apply theme before Angular boots - prevents flash of wrong theme
    (function () {
      try {
        var h = new Date().getHours();
        var isNight = h >= 18 || h < 6;
        var saved = localStorage.getItem('app-theme');
        document.documentElement.setAttribute('data-theme', saved || (isNight ? 'dark' : 'light'));
      } catch (e) { /* SSR / private browsing */ }
    })();

    // Capture beforeinstallprompt immediately - fires before Angular boots
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.__pwaPrompt = e;
    });

    // Register SW on every page load so Chrome evaluates PWA installability
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function() {});
      });
    }

    // iOS PWA: env(safe-area-inset-bottom) returns 0 on first paint due to a WebKit
    // timing bug. We pre-set --safe-area-bottom to 34px synchronously (before the
    // browser renders a single pixel) so the bottom nav is always correctly sized on
    // the very first frame - including after login redirects that trigger a full reload.
    // The polling block below then measures the exact value and overrides if needed.
    (function () {
      if (!window.navigator.standalone) return;
      var root = document.documentElement;
      var tries = 0;

      // Synchronous pre-set: runs before first layout/paint, so no transition fires.
      root.style.setProperty('--safe-area-bottom', '34px');

      function measure() {
        var el = document.createElement('div');
        el.style.cssText = 'position:fixed;bottom:0;left:0;width:1px;height:env(safe-area-inset-bottom,0px);pointer-events:none;visibility:hidden;';
        document.body.appendChild(el);
        var h = el.offsetHeight;
        document.body.removeChild(el);
        return h;
      }

      function apply(px) {
        root.style.setProperty('--safe-area-bottom', px + 'px');
        root.setAttribute('data-safe-ready', '1');
        nudgeReflow();
      }

      // iOS PWA cold launch: the layout viewport WebKit uses for
      // `position: fixed` elements is briefly out of sync with the true
      // visual viewport, leaving the bottom nav floating above the real
      // bottom edge with a gap beneath it. Navigating to another route later
      // forces Angular to relayout the page, which happens to make WebKit
      // re-derive the correct viewport - fixing it from then on. This nudges
      // the same recalculation immediately on first paint by forcing two
      // reflows (grow 1px, then shrink back) within consecutive frames, so
      // it's visually imperceptible.
      function nudgeReflow() {
        var html = root;
        var prev = html.style.paddingBottom;
        html.style.paddingBottom = 'calc(' + (html.style.paddingBottom || '0px') + ' + 1px)';
        requestAnimationFrame(function () {
          html.style.paddingBottom = prev;
        });
      }

      function poll() {
        var val = measure();
        if (val > 0) { apply(val); return; }
        if (++tries < 30) { requestAnimationFrame(poll); }
        else { apply(34); } // fallback: standard Face ID home-indicator height
      }

      document.addEventListener('DOMContentLoaded', poll);

      // Re-run on bfcache restores (e.g. swipe-back into the PWA) where
      // DOMContentLoaded doesn't fire again.
      window.addEventListener('pageshow', function (e) {
        if (e.persisted) nudgeReflow();
      });

      window.addEventListener('orientationchange', function () {
        tries = 0;
        // iOS takes ~300ms to update env() after orientation change
        setTimeout(function () {
          var val = measure();
          if (val > 0) apply(val);
        }, 350);
      });
    })();
  </script>
