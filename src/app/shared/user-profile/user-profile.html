<div class="profile-panel">

  <div class="panel-caret" aria-hidden="true"></div>

  <!-- ── Header ── -->
  <div class="panel-header">
    <div class="panel-header-bg" aria-hidden="true"></div>

    <button class="panel-close" (click)="closeProfile($event)" aria-label="Close profile panel">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="panel-avatar-wrap">
      <div class="panel-avatar">
        @if (avatar) {
          <img [src]="avatar" alt="Profile photo" class="panel-avatar-img" />
        } @else {
          {{ name.charAt(0).toUpperCase() }}
        }
      </div>
      <span class="panel-role-badge role-{{ role }}">{{ roleLabel }}</span>
    </div>

    <div class="panel-identity">
      <span class="panel-name">{{ name }}</span>
      <span class="panel-email">{{ email }}</span>
    </div>
  </div>

  <!-- ── Stats ── -->
  @if (totalBlogs > 0 || totalViews > 0) {
    <div class="panel-stats">
      <div class="panel-stat">
        <strong>{{ totalBlogs }}</strong>
        <span>Stories</span>
      </div>
      <div class="panel-stat-divider"></div>
      <div class="panel-stat">
        <strong>{{ totalViews | formatCount }}</strong>
        <span>Total Reads</span>
      </div>
    </div>
  }

  <!-- ── Footer: logout ── -->
  <div class="panel-footer">
    <button class="panel-logout" (click)="onLogout($event)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Sign Out
    </button>
  </div>

</div>
