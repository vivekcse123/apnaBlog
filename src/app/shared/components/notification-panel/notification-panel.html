<div class="notification-wrapper">

  <!-- 🔔 ICON -->
  <button class="bell-btn" (click)="togglePanel($event)">
    <mat-icon>notifications</mat-icon>

    <span *ngIf="unreadCount > 0" class="badge">
      {{ unreadCount }}
    </span>
  </button>

  <!-- 📦 PANEL -->
  <div class="panel" *ngIf="panelOpen">

    <!-- HEADER -->
    <div class="panel-header">
      <span>Notifications</span>

      <div class="actions">
        <button (click)="onRefresh($event)">
          <mat-icon>refresh</mat-icon>
        </button>

        <button (click)="onMarkAllRead($event)">
          <mat-icon>done_all</mat-icon>
        </button>
      </div>
    </div>

    <!-- LOADING -->
    <div *ngIf="loading" class="loader">
      <mat-spinner diameter="30"></mat-spinner>
    </div>

    <!-- EMPTY -->
    <div *ngIf="!loading && notifications.length === 0" class="empty">
      No notifications
    </div>

    <!-- LIST -->
    <div
      *ngFor="let n of notifications; trackBy: trackById"
      class="notification-item"
      [class.unread]="!n.isRead"
      (click)="onNotificationClick(n)"
    >
      <!-- ICON -->
      <mat-icon
        [style.color]="getMeta(n.type).color"
      >
        {{ getMeta(n.type).icon }}
      </mat-icon>

      <!-- CONTENT -->
      <div class="content">
        <div class="title">
          {{ n.title || getMeta(n.type).label }}
        </div>

        <div class="message">
          {{ n.message }}
        </div>

        <div class="time">
          {{ n.createdAt | date:'short' }}
        </div>
      </div>

      <!-- DELETE -->
      <button
        class="delete-btn"
        (click)="onDelete($event, n.id)"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>

  </div>
</div>
