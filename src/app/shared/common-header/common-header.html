<header class="header">

  <a class="app-logo" routerLink="/">
    <img class="app-logo-img" src="/logo.png" alt="ApnaInsights" />
    <span class="app-logo-text">ApnaInsights</span>
  </a>

  <nav class="nav" role="navigation" aria-label="Main navigation">
    @for (nav of navs; track nav.label) {
      <a
        [routerLink]="nav.routerLink"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link"
      >
        {{ nav.label }}
      </a>
    }
  </nav>

  <div class="right-section">
    <app-notification-panel />

    <div class="profile" (click)="openProfile($event)">
      @if (avatarUrl) {
        <img [src]="avatarUrl" class="profile-avatar-img" alt="Profile" />
      } @else {
        {{ profile }}
      }
    </div>
  </div>

  <button
    class="hamburger"
    type="button"
    (click)="toggleMenu()"
    [class.open]="menuOpen"
    aria-label="Toggle navigation menu"
    [attr.aria-expanded]="menuOpen"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

</header>

<div class="mobile-drawer" [class.open]="menuOpen" role="navigation" aria-label="Mobile navigation">
  @for (nav of navs; track nav.label) {
    <a
      [routerLink]="nav.routerLink"
      routerLinkActive="drawer-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="drawer-link"
      (click)="menuOpen = false"
    >
      {{ nav.label }}
    </a>
  }
</div>

<div
  class="drawer-backdrop"
  [class.open]="menuOpen"
  (click)="menuOpen = false"
  aria-hidden="true"
></div>
