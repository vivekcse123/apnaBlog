<header class="header">

  <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen">
    <span></span><span></span><span></span>
  </button>

  <div class="logo">
    <span class="logo-hex">⬡</span>
    <span class="logo-text">{{ logo }}</span>
  </div>

  <nav class="nav">
    @for (nav of navs; track nav.label) {
      <a [routerLink]="nav.routerLink" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }" class="nav-link">
        {{ nav.label }}
      </a>
    }
  </nav>

  <div class="right-section">
    <app-notification-panel />

    <div class="profile" (click)="openProfile($event)">
      {{ profile }}
    </div>
  </div>

</header>

<div class="mobile-drawer" [class.open]="menuOpen">
  @for (nav of navs; track nav.label) {
    <a [routerLink]="nav.routerLink" routerLinkActive="drawer-active"
       [routerLinkActiveOptions]="{ exact: true }" class="drawer-link"
       (click)="menuOpen = false">
      {{ nav.label }}
    </a>
  }
</div>
<div class="drawer-backdrop" [class.open]="menuOpen" (click)="menuOpen = false"></div>
