<app-common-header
  [navs]="[
    { label: 'Home', routerLink: `/admin/${userId()}` },
    { label: 'Users', routerLink: `/admin/${userId()}/manage-users` },
    { label: 'Blogs', routerLink: `/admin/${userId()}/manage-blogs` },
    { label: 'Settings', routerLink: `/admin/${userId()}/settings` },
    { label: 'Traffic →', routerLink: `/admin/${userId()}/visitor` }
  ]"
  [profile]="initial()"
  [name]="user()?.name"
  [avatarUrl]="avatar()"
  [userRole]="user()?.role"
  [panelOpen]="isOpened()"
  (open)="openProfile()"
>
</app-common-header>

@if (isOpened()) {
  <app-user-profile
    [name]="user()?.name"
    [email]="user()?.email"
    [role]="user()?.role"
    [avatar]="avatar()"
    [userId]="userId() ?? ''"
    [basePath]="'admin'"
    [totalBlogs]="user()?.totalBlogs ?? 0"
    [totalViews]="user()?.totalViews ?? 0"
    (close)="closeProfile()"
    (logout)="logout()">
  </app-user-profile>
}
<router-outlet></router-outlet>
