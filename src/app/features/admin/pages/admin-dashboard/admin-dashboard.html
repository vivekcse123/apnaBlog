<app-common-header
  [navs]="[
    { label: 'Home', routerLink: `/admin/${userId()}` },
    { label: 'Users', routerLink: `/admin/${userId()}/manage-users` },
    { label: 'Blogs', routerLink: `/admin/${userId()}/manage-blogs` },
    { label: 'Settings', routerLink: `/admin/${userId()}/settings` },
    { label: 'Traffic →', routerLink: `/admin/${userId()}/visitor` }
  ]"
  [profile]="initial()"
  [avatarUrl]="avatar()"
  [userRole]="user()?.role"
  [panelOpen]="isOpened()"
  (open)="openProfile()"
>
</app-common-header>

@if(isOpened()){
<app-user-profile
  [name]="user()?.name"
  [email]="user()?.email"
  [role]="user()?.role"
  [avatar]="avatar()"
  (close)="closeProfile()"
>
<a [routerLink]="['/admin', userId(), 'settings']"
   class="edit_setting"
   primary-action>
  Edit Setting
</a>
<a routerLink="/" secondary-action (click)="logout()" class="logout_btn">Logout</a>
</app-user-profile>
}
<router-outlet></router-outlet>
