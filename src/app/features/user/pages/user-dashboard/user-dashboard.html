<app-common-header
  [navs]="[
    { label: 'Home',           routerLink: '/user/' + userId() },
    { label: 'Blogs',          routerLink: '/user/' + userId() + '/manage-blogs' },
    { label: 'Settings',       routerLink: '/user/' + userId() + '/settings' },
    { label: 'Explore Blogs →',routerLink: '/user/' + userId() + '/explore-blogs' }
  ]"
  [profile]="initial()"
  [name]="user()?.name"
  [avatarUrl]="avatar()"
  [userRole]="user()?.role"
  [panelOpen]="isOpened()"
  (open)="openProfile()">
</app-common-header>

@if (isOpened()) {
  <app-user-profile
    [name]="user()?.name"
    [email]="user()?.email"
    [role]="user()?.role"
    [avatar]="avatar()"
    [userId]="userId()"
    [totalBlogs]="user()?.totalBlogs ?? 0"
    [totalViews]="user()?.totalViews ?? 0"
    (close)="closeProfile()"
    (logout)="logout()">
  </app-user-profile>
}

<router-outlet></router-outlet>
