<div class="dash-shell">

  <app-sidebar
    [isOpen]="sidebarOpen()"
    (close)="sidebarOpen.set(false)"
    [navLinks]="navLinks()"
    [shortcuts]="dashboardShortcuts()">
  </app-sidebar>

  <div class="dash-main">
    <app-common-header
      [profile]="initial()"
      [name]="user()?.name"
      [avatarUrl]="avatar()"
      [userRole]="user()?.role"
      [navs]="[]"
      [panelOpen]="isOpened()"
      (open)="openProfile()"
      (searchChange)="onSearch($event)"
      (menuToggle)="toggleSidebar()">
      @if (isOpened()) {
        <app-user-profile
          profilePanel
          [name]="user()?.name"
          [email]="user()?.email"
          [role]="user()?.role"
          [avatar]="avatar()"
          [userId]="userId()"
          [totalBlogs]="user()?.totalBlogs ?? 0"
          [totalViews]="user()?.totalViews ?? 0"
          [hasLifetime]="hasLifetimeAccess(user())"
          (close)="closeProfile()"
          (logout)="logout()">
        </app-user-profile>
      }
    </app-common-header>

    <div class="dash-content">
      <router-outlet></router-outlet>
    </div>
  </div>

</div>

<app-mobile-bottom-nav mode="dashboard"></app-mobile-bottom-nav>
