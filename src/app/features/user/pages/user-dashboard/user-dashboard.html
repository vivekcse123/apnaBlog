<app-common-header
  [navs]="[
    { label: 'Home', routerLink: `/user/${userId()}` },
    { label: 'Blogs', routerLink: `/user/${userId()}/manage-blogs` },
    { label: 'Settings', routerLink: `/user/${userId()}/settings` },
    { label: 'Explore Blogs →', routerLink: `/user/${userId()}/welcome/apna-blog`}
  ]"
  [profile]="initial()"
  (open)="openProfile()"
  >
</app-common-header>
@if(isOpened()){
<app-user-profile
[email]="user()?.email"
[name]="user()?.name"
[role]="user()?.role"
(close)="closeProfile()"
>
<a routerLink="/" primary-action class="edit_setting">Edit Setting</a>
<a routerLink="/" secondary-action (click)="logout()" class="logout_btn">Logout</a>
</app-user-profile>
}

<router-outlet></router-outlet>
