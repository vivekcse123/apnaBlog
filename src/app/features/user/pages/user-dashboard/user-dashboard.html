<div class="dash-shell">

  <app-sidebar
    [isOpen]="sidebarOpen()"
    (close)="sidebarOpen.set(false)"
    [navLinks]="[
      { label: 'Home',         routerLink: '/user/' + userId(),                         icon: 'home',     exact: true  },
      { label: 'Blogs',        routerLink: '/user/' + userId() + '/manage-blogs',       icon: 'docs',     exact: false },
      { label: 'My Shorts',    routerLink: '/user/' + userId() + '/my-shorts',          icon: 'video',    exact: false },
      { label: 'Shorts Feed',  routerLink: '/shorts',                                   icon: 'video',    exact: true  },
      { label: 'Bookmarks',    routerLink: '/bookmarks',                                icon: 'bookmark', exact: true  },
      { label: 'Read Stories', routerLink: '/user/' + userId() + '/explore-blogs',      icon: 'search',   exact: false },
      { label: 'Settings',     routerLink: '/user/' + userId() + '/settings',           icon: 'settings', exact: false }
    ]"
    [shortcuts]="[
      { label: 'Write a Story', routerLink: '/user/' + userId() + '/create-blog', icon: 'write' },
      { label: 'View Site',     routerLink: '/',                                     icon: 'globe' }
    ]"
    [userName]="user()?.name ?? ''"
    [userRole]="user()?.role ?? ''"
    [avatarUrl]="avatar()"
    [initial]="initial()"
    (logout)="logout()"
    (profileClick)="openProfile()">
  </app-sidebar>

  <div class="dash-main">
    <app-common-header
      [profile]="initial()"
      [name]="user()?.name"
      [avatarUrl]="avatar()"
      [userRole]="user()?.role"
      [navs]="[]"
      [panelOpen]="isOpened()"
      (open)="openProfile()"
      (searchChange)="onSearch($event)"
      (menuToggle)="toggleSidebar()">
      @if (isOpened()) {
        <app-user-profile
          profilePanel
          [name]="user()?.name"
          [email]="user()?.email"
          [role]="user()?.role"
          [avatar]="avatar()"
          [userId]="userId()"
          [totalBlogs]="user()?.totalBlogs ?? 0"
          [totalViews]="user()?.totalViews ?? 0"
          (close)="closeProfile()"
          (logout)="logout()">
        </app-user-profile>
      }
    </app-common-header>

    <div class="dash-content">
      <router-outlet></router-outlet>
    </div>
  </div>

</div>

<app-mobile-bottom-nav mode="dashboard"></app-mobile-bottom-nav>
