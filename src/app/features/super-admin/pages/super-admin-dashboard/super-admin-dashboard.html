<div class="dash-shell">

  <app-sidebar
    [isOpen]="sidebarOpen()"
    (close)="sidebarOpen.set(false)"
    [navLinks]="[
      { label: 'Home',            routerLink: '/super-admin/' + userId(),                      icon: 'home',     exact: true  },
      { label: 'Role Management', routerLink: '/super-admin/' + userId() + '/role-management', icon: 'shield',   exact: false },
      { label: 'Users',           routerLink: '/super-admin/' + userId() + '/manage-users',    icon: 'users',    exact: false },
      { label: 'Blogs',           routerLink: '/super-admin/' + userId() + '/manage-blogs',    icon: 'docs',     exact: false },
      { label: 'Traffic',         routerLink: '/super-admin/' + userId() + '/visitor',         icon: 'chart',    exact: false },
      { label: 'Settings',        routerLink: '/super-admin/' + userId() + '/settings',        icon: 'settings', exact: false }
    ]"
    [shortcuts]="[
      { label: 'Write a Story', routerLink: '/super-admin/' + userId() + '/manage-blogs', icon: 'write' },
      { label: 'View Site',     routerLink: '/welcome',                                    icon: 'globe' }
    ]"
    [userName]="user()?.name ?? ''"
    [userRole]="'super_admin'"
    [avatarUrl]="avatar()"
    [initial]="initial() ?? ''"
    (logout)="logout()"
    (profileClick)="openProfile()">
  </app-sidebar>

  <div class="dash-main">
    <app-common-header
      [profile]="initial()"
      [name]="user()?.name"
      [avatarUrl]="avatar()"
      [userRole]="'super_admin'"
      [navs]="[]"
      [panelOpen]="isOpened()"
      (open)="openProfile()"
      (menuToggle)="toggleSidebar()">
    </app-common-header>

    @if (isOpened()) {
      <app-user-profile
        [name]="user()?.name"
        [email]="user()?.email"
        [role]="user()?.role"
        [avatar]="avatar()"
        [userId]="userId() ?? ''"
        [basePath]="'super-admin'"
        [totalBlogs]="user()?.totalBlogs ?? 0"
        [totalViews]="user()?.totalViews ?? 0"
        (close)="closeProfile()"
        (logout)="logout()">
      </app-user-profile>
    }

    <div class="dash-content">
      <router-outlet></router-outlet>
    </div>
  </div>

</div>
