<div class="dash-shell">

  <app-sidebar
    [isOpen]="sidebarOpen()"
    (close)="sidebarOpen.set(false)"
    [navLinks]="[
      { label: 'Home',            routerLink: '/super-admin/' + userId(),                      icon: 'home',     exact: true,  groupLabel: 'Content' },
      { label: 'Blogs',           routerLink: '/super-admin/' + userId() + '/manage-blogs',    icon: 'docs',     exact: false, groupLabel: 'Content' },
      { label: 'Shorts',          routerLink: '/super-admin/' + userId() + '/manage-shorts',   icon: 'video',    exact: false, groupLabel: 'Content' },
      { label: 'Taxonomy',        routerLink: '/super-admin/' + userId() + '/taxonomy',        icon: 'taxonomy', exact: false, groupLabel: 'Content' },
      { label: 'Users',           routerLink: '/super-admin/' + userId() + '/manage-users',    icon: 'users',    exact: false, groupLabel: 'Access' },
      { label: 'Role Management', routerLink: '/super-admin/' + userId() + '/role-management', icon: 'shield',   exact: false, groupLabel: 'Access' },
      { label: 'Callback Requests', routerLink: '/super-admin/' + userId() + '/career-guides/callback-requests', icon: 'comment', exact: false, groupLabel: 'Access' },
      { label: 'Traffic',         routerLink: '/super-admin/' + userId() + '/visitor',         icon: 'chart',    exact: false, groupLabel: 'Insights' },
      { label: 'Settings',        routerLink: '/super-admin/' + userId() + '/settings',        icon: 'settings', exact: false, groupLabel: 'Settings' }
    ]"
    [shortcuts]="[
      { label: 'Write a Story', routerLink: '/super-admin/' + userId() + '/manage-blogs', icon: 'write' },
      { label: 'View Site',     routerLink: '/',                                           icon: 'globe' }
    ]">
  </app-sidebar>

  <div class="dash-main">
    <app-common-header
      [profile]="initial()"
      [name]="user()?.name"
      [avatarUrl]="avatar()"
      [userRole]="'super_admin'"
      [navs]="[]"
      [panelOpen]="isOpened()"
      (open)="openProfile()"
      (menuToggle)="toggleSidebar()">
      @if (isOpened()) {
        <app-user-profile
          profilePanel
          [name]="user()?.name"
          [email]="user()?.email"
          [role]="user()?.role"
          [avatar]="avatar()"
          [userId]="userId() ?? ''"
          [basePath]="'super-admin'"
          [totalBlogs]="user()?.totalBlogs ?? 0"
          [totalViews]="user()?.totalViews ?? 0"
          (close)="closeProfile()"
          (logout)="logout()">
        </app-user-profile>
      }
    </app-common-header>

    <div class="dash-content">
      <router-outlet></router-outlet>
    </div>
  </div>

  <app-mobile-bottom-nav mode="dashboard"></app-mobile-bottom-nav>
</div>
