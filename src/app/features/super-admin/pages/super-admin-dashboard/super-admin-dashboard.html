<app-common-header
  [navs]="[
    { label: 'Home',            routerLink: '/super-admin/' + userId() },
    { label: 'Role Management', routerLink: '/super-admin/' + userId() + '/role-management' },
    { label: 'Users',           routerLink: '/super-admin/' + userId() + '/manage-users' },
    { label: 'Blogs',           routerLink: '/super-admin/' + userId() + '/manage-blogs' },
    { label: 'Settings',        routerLink: '/super-admin/' + userId() + '/settings' },
    { label: 'Traffic →',       routerLink: '/super-admin/' + userId() + '/visitor' }
  ]"
  [profile]="initial()"
  [name]="user()?.name"
  [avatarUrl]="avatar()"
  [userRole]="'super_admin'"
  [panelOpen]="isOpened()"
  (open)="openProfile()"
>
</app-common-header>

@if (isOpened()) {
  <app-user-profile
    [name]="user()?.name"
    [email]="user()?.email"
    [role]="user()?.role"
    [avatar]="avatar()"
    [userId]="userId() ?? ''"
    [basePath]="'super-admin'"
    [totalBlogs]="user()?.totalBlogs ?? 0"
    [totalViews]="user()?.totalViews ?? 0"
    (close)="closeProfile()"
    (logout)="logout()">
  </app-user-profile>
}

<router-outlet></router-outlet>
